# okurite.pro — /columns → drafity app
# パンくず: トップ → 営業代行LP(/okurite) → 営業代行記事一覧 → 記事

location ^~ /columns {
    proxy_set_header Host drafity.pro;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # ★ 親LPのURLのみ（日本語ヘッダー禁止）
    proxy_set_header X-Brand-Lp-Path /okurite;

    proxy_set_header Accept-Encoding "";
    proxy_pass https://drafity.pro/app/columns;
    proxy_ssl_server_name on;
    proxy_redirect off;
    proxy_read_timeout 90;

    sub_filter_types text/html text/css application/javascript;
    sub_filter 'https://drafity.pro' 'https://okurite.pro';
    sub_filter 'http://drafity.pro' 'https://okurite.pro';
    sub_filter '/assets_ok/' '/remote-assets/';
    sub_filter '/assets/' '/remote-assets/';
    sub_filter '/app/columns' '/columns';
    sub_filter_once off;
    proxy_cookie_domain drafity.pro okurite.pro;
}
