# development/test: SQLite3（既存ローカルデータをそのまま使える）
# production: PostgreSQL（本番データは別途 SQLite から移行）

default: &default
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 15 } %>
  timeout: 30000

development:
  <<: *default
  adapter: sqlite3
  database: <%= Rails.root.join('db', 'development.sqlite3').to_s %>
  variables:
    journal_mode: WAL
    synchronous: NORMAL

test:
  <<: *default
  adapter: sqlite3
  database: db/test.sqlite3

# DATABASE_URL があれば優先。なければ個別設定。
production:
  <<: *default
  adapter: postgresql
  encoding: unicode
  pool: <%= ENV.fetch("RAILS_MAX_THREADS") { 15 } %>
  <% if ENV["DATABASE_URL"].present? %>
  url: <%= ENV["DATABASE_URL"] %>
  <% else %>
  host: <%= ENV.fetch("DB_HOST", "127.0.0.1") %>
  port: <%= ENV.fetch("DB_PORT", "5432") %>
  database: <%= ENV.fetch("DB_NAME", "okurite_production") %>
  username: <%= ENV.fetch("DB_USERNAME", "okurite") %>
  password: <%= ENV["DB_PASSWORD"] %>
  <% end %>
